# Local ATSocy relay config for development.
# Run from the ATSocy.com repo root so the DB path lands in ./.local/atsrfry-db/

db = "./.local/atsrfry-db/"

relay {
    bind = "127.0.0.1"
    port = 7777
    realIpHeader = ""

    auth {
        enabled = false
        serviceUrl = ""
    }

    info {
        name = "ATSocy Local Relay"
        description = "Local atsrfry relay for ATSocy.com development."
        pubkey = ""
        self = ""
        contact = ""
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        nips = ""
    }

    autoPingSeconds = 55
    enableTcpKeepalive = false
    maxFilterLimit = 500
    maxSubsPerConnection = 64

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        invalidEvents = true
    }
}
