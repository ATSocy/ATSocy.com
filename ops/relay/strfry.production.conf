# Production ATSocy relay config.
# Recommended paths assume Ubuntu with a dedicated service account and persistent storage.

db = "/var/lib/atsrfry/db/"

relay {
    bind = "127.0.0.1"
    port = 7777
    realIpHeader = "x-real-ip"

    auth {
        enabled = true
        serviceUrl = "wss://relay.atsocy.com"
    }

    info {
        name = "ATSocy.com Nostr Relay"
        description = "ATSocy public relay for editorial syndication and community traffic."
        pubkey = "bca6f38d9526e485847ae0b38bbb62c26f95d69e6604621c1f028dd01e3adf17"
        self = "wss://relay.atsocy.com"
        contact = "https://atsocy.com"
        icon = "https://atsocy.com/og-image.png"
        banner = ""
        privacy = "https://atsocy.com/privacy"
        terms = "https://atsocy.com/terms"
        nips = "[1,2,4,9,11,28,40,42,45,70,77]"
    }

    autoPingSeconds = 25
    enableTcpKeepalive = true
    maxFilterLimit = 500
    maxFilterLimitCount = 1000000
    maxSubsPerConnection = 128
    maxPendingOutboundBytes = 33554432

    # Start public and add a moderation/rate-limit plugin later if abuse appears.
    writePolicy {
        plugin = ""
        timeoutSeconds = 5
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        invalidEvents = true
    }
}
